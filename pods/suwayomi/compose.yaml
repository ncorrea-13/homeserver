networks:
  suwayomi-net:
    driver: bridge

services:
  suwayomi:
    image: ghcr.io/suwayomi/suwayomi-server:latest
    container_name: tachidesk
    restart: unless-stopped
    ports:
      - "${SUWAYOMI_PORT:-4567}:4567"
    environment:
      - TZ=${TZ}
      - TACHIDESK_DATA_DIR=/home/suwayomi/.local/share/Tachidesk
      - JAVA_TOOL_OPTIONS=-Xms64m -Xmx512m
    volumes:
      - ./tachidesk:/home/suwayomi/.local/share/Tachidesk:Z
    networks:
      - suwayomi-net
    deploy:
      resources:
        limits:
          memory: 1280M

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    ports:
      - "${FLARESOLVERR_PORT:-8191}:8191"
    environment:
      - LOG_LEVEL=${FLARESOLVERR_LOG_LEVEL:-info}
    networks:
      - suwayomi-net
    deploy:
      resources:
        limits:
          memory: 512M
