services:
  homepage:
    image: docker.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    ports:
      - "${HOMEPAGE_PORT:-3000}:3000"
    volumes:
      - ./homepage/images:/app/public/images:Z
      - ./homepage/config:/app/config:Z
    environment:
      - TZ=${TZ}
      - HOMEPAGE_VAR_SERVER_HOST_VALIDATION=false
      - HOMEPAGE_ALLOWED_HOSTS=${HOMEPAGE_ALLOWED_HOSTS}

  uptime-kuma:
    image: docker.io/louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: always
    ports:
      - "${UPTIME_KUMA_PORT:-3001}:3001"
    volumes:
      - ./uptime-kuma-data:/app/data
      - ${PODMAN_SOCKET}:/var/run/docker.sock:ro
    security_opt:
      - label=disable
    logging:
      driver: journald

  ntfy:
    image: docker.io/binwiederhier/ntfy:latest
    container_name: ntfy
    restart: unless-stopped
    user: "${NTFY_UID:-1000}:${NTFY_GID:-1000}"
    command: serve
    ports:
      - "${NTFY_PORT:-2586}:2586"
    environment:
      TZ: ${TZ}
      NTFY_BASE_URL: ${NTFY_BASE_URL}
      NTFY_LISTEN_HTTP: ":${NTFY_PORT:-2586}"
      NTFY_CACHE_FILE: /var/cache/ntfy/cache.db
      NTFY_AUTH_FILE: /var/lib/ntfy/auth.db
      NTFY_AUTH_DEFAULT_ACCESS: deny-all
      NTFY_BEHIND_PROXY: "true"
    volumes:
      - ./ntfy/cache:/var/cache/ntfy:Z
      - ./ntfy/lib:/var/lib/ntfy:Z
    logging:
      driver: journald
