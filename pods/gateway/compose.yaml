services:
  pihole:
    container_name: pihole
    image: docker.io/pihole/pihole:latest
    network_mode: host
    restart: always
    shm_size: '256mb'
    environment:
      TZ: ${TZ}
      WEBPASSWORD_FILE: /run/secrets/pi_password
      FTLCONF_webserver_port: ${PIHOLE_WEB_PORT:-8085}
      FTLCONF_webserver_tls_enabled: 'false'
      FTLCONF_webserver_trusted_hosts: ${PIHOLE_TRUSTED_HOSTS}
      DNSMASQ_LISTENING: 'all'
    secrets:
      - pi_password
    volumes:
      - ./pihole/etc-pihole:/etc/pihole:Z
      - ./pihole/etc-dnsmasq.d:/etc/dnsmasq.d:Z
    cap_add:
      - NET_ADMIN
      - NET_BIND_SERVICE
    tmpfs:
      - /tmp:size=64M
      - /run:size=16M
      - /var/log/pihole:size=64M
      - /var/log/lighttpd:size=16M
    logging:
      driver: journald

  unbound:
    container_name: unbound
    image: docker.io/klutchell/unbound:latest
    network_mode: host
    restart: always
    command: ["-c", "/etc/unbound/unbound.conf", "-d"]
    volumes:
      - ./unbound/unbound.conf:/etc/unbound/unbound.conf:Z
    logging:
      driver: journald

secrets:
  pi_password:
    external: true
