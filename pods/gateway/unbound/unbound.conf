server:
    interface: 127.0.0.1
    interface: 0.0.0.0
    port: 5053

    do-ip4: yes
    do-udp: yes
    do-tcp: yes
    do-ip6: no

    access-control: 0.0.0.0/0 allow

    harden-dnssec-stripped: yes
    use-caps-for-id: yes

    qname-minimisation: yes
    hide-identity: yes
    hide-version: yes

    so-sndbuf: 0
    tls-cert-bundle: "/etc/ssl/certs/ca-certificates.crt"
forward-zone:
    name: "."
    forward-tls-upstream: yes
    forward-addr: 194.242.2.2@853#base.dns.mullvad.net
