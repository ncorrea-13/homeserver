server: 
    interface: 0.0.0.0 
    port: 5053 
    do-ip4: yes 
    do-udp: yes 
    do-tcp: yes
    do-ip6: no
    access-control: 0.0.0.0/0 allow root-hints:
    "/var/lib/unbound/root.hints" harden-dnssec-stripped: yes
    use-caps-for-id: yes
    qname-minimisation: yes hide-identity: yes hide-version: yes

    tls-cert-bundle: "/etc/ssl/certs/ca-certificates.crt"

forward-zone: name: "." forward-tls-upstream: yes forward-addr:
    9.9.9.9@853#dns.quad9.net forward-addr:
    149.112.112.112@853#dns.quad9.net
